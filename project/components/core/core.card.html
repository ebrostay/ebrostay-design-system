<!-- @dsCard group="Components" viewport="700x440" name="Core — Buttons, Badges, Avatar, Rating" subtitle="Actions, status, identity & rating primitives" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:24px;color:var(--text-body)}
  .group{margin-bottom:22px}
  .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-subtle);margin:0 0 12px}
  .row{display:flex;flex-wrap:wrap;align-items:center;gap:12px}
</style></head>
<body><div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge, Tag, Avatar, Rating } = window.EbrostayDesignSystem_8b1b13;
  const I = (n) => <i data-lucide={n}></i>;
  function Demo(){
    return (<>
      <div className="group"><p className="lbl">Button — variants</p><div className="row">
        <Button variant="primary" icon={I('search')}>Search stays</Button>
        <Button variant="accent">Reserve now</Button>
        <Button variant="secondary">Save</Button>
        <Button variant="subtle">Message host</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="primary" loading>Loading</Button>
      </div></div>
      <div className="group"><p className="lbl">Button — sizes</p><div className="row">
        <Button size="sm">Small</Button><Button size="md">Medium</Button><Button size="lg">Large</Button>
        <IconButton label="Like" variant="secondary">{I('heart')}</IconButton>
        <IconButton label="Share" variant="ghost">{I('share')}</IconButton>
        <IconButton label="Next" variant="solid">{I('arrow-right')}</IconButton>
      </div></div>
      <div className="group"><p className="lbl">Badge & Tag</p><div className="row">
        <Badge tone="brand" dot>Available</Badge>
        <Badge tone="accent" solid>Superhost</Badge>
        <Badge tone="warning">3 left</Badge>
        <Badge tone="info">New</Badge>
        <Tag icon={I('wifi')}>Wi-Fi</Tag>
        <Tag selected>Whole place</Tag>
        <Tag removable>Centre</Tag>
      </div></div>
      <div className="group"><p className="lbl">Avatar & Rating</p><div className="row">
        <Avatar name="Marta Gil" size="lg" ring />
        <Avatar name="Jon Saez" status="online" />
        <Avatar name="Ana R" size="sm" />
        <span style={{width:16}}></span>
        <Rating value={4.8} count={126} />
      </div></div>
    </>);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide && window.lucide.createIcons(), 60);
</script>
</body></html>
