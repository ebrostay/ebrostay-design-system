<!-- @dsCard group="Colors" viewport="700x190" name="Status colors" subtitle="ok / warn / danger + softs, star gold — river-deep is 'info'" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface);padding:18px;color:var(--body-text)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .item{border:1px solid var(--line);border-radius:var(--radius-control);overflow:hidden}
  .bar{height:44px}
  .meta{display:flex;align-items:center;gap:8px;padding:9px 11px}
  .meta b{font-size:12.5px;color:var(--ink)}
  .pill{font-size:10px;font-family:var(--font-mono);padding:2px 7px;border-radius:var(--radius-pill)}
  .note{margin:12px 2px 0;font-size:11px;color:var(--muted)}
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="bar" style="background:var(--ok)"></div><div class="meta"><b>ok</b><span class="pill" style="background:var(--brand-soft);color:var(--brand-strong)">brand-soft</span></div></div>
    <div class="item"><div class="bar" style="background:var(--warn)"></div><div class="meta"><b>warn</b><span class="pill" style="background:var(--warn-soft);color:#7a5410">warn-soft</span></div></div>
    <div class="item"><div class="bar" style="background:var(--danger)"></div><div class="meta"><b>danger</b><span class="pill" style="background:var(--danger-soft);color:#8f2a2a">danger-soft</span></div></div>
    <div class="item"><div class="bar" style="background:var(--star)"></div><div class="meta"><b>star</b><span class="pill" style="background:var(--surface-2);color:var(--muted)">rating gold</span></div></div>
  </div>
  <p class="note">Status hues are reserved for review and rejection states — a listing pending approval, a declined request. There is no separate info blue: <b>river-deep</b> serves the info role. Ok doubles as the brand green.</p>
</body></html>
