<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:24px;display:flex;gap:28px;align-items:stretch}
  .panel{flex:1;border:1px solid var(--border-subtle);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;gap:14px;padding:20px}
  .dark{background:var(--surface-inverse);border:0}
  .lbl{position:absolute;font-size:10px;font-family:var(--font-mono);color:var(--text-subtle)}
  .wrap{position:relative;flex:1;display:flex;flex-direction:column;gap:8px}
</style></head>
<body>
  <div class="panel"><img src="../assets/logo-wordmark.svg" height="40" alt="Ebrostay"></div>
  <div class="panel" style="flex:0 0 120px"><img src="../assets/logo-mark.svg" width="64" alt=""></div>
  <div class="panel dark" style="flex:0 0 120px"><img src="../assets/logo-mark-inverse.svg" width="64" alt=""></div>
</body></html>
