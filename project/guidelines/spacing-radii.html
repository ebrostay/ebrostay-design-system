<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="Two values — control 8 · card 14 · pill. Contract discipline, not hospitality soft" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface);padding:22px}
  .row{display:flex;gap:22px;align-items:flex-end}
  .c{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{background:var(--river-soft);border:1.5px solid var(--river-deep)}
  .c b{font-family:var(--font-mono);font-size:10px;color:var(--muted);font-weight:500}
  .note{margin:14px 2px 0;font-size:11px;color:var(--muted)}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="width:96px;height:44px;border-radius:var(--radius-control)"></div><b>control · 8</b></div>
    <div class="c"><div class="box" style="width:96px;height:78px;border-radius:var(--radius-card)"></div><b>card · 14</b></div>
    <div class="c"><div class="box" style="width:96px;height:36px;border-radius:var(--radius-pill)"></div><b>pill</b></div>
  </div>
  <p class="note"><b>Two radii, on purpose.</b> Controls (buttons, inputs, month cells) at 8px; cards, photos and dialogs at 14px. v1's 18–30px hospitality curves are gone — the ledger is disciplined, warmth comes from the photography. Legacy <span style="font-family:var(--font-mono)">--radius-sm/md/lg/xl</span> alias onto these.</p>
</body></html>
