<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="Consolidated — sm 8 · md 12 · lg 18 · xl 24 · 2xl 30 · pill" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:22px}
  .row{display:flex;gap:18px;align-items:flex-end}
  .c{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:84px;height:84px;background:var(--green-100);border:1.5px solid var(--green-400)}
  .c b{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="border-radius:var(--radius-sm)"></div><b>sm · 8</b></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-md)"></div><b>md · 12</b></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-lg)"></div><b>lg · 18</b></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-xl)"></div><b>xl · 24</b></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-2xl)"></div><b>2xl · 30</b></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-pill)"></div><b>pill</b></div>
  </div>
</body></html>
