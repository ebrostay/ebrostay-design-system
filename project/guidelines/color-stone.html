<!-- @dsCard group="Colors" viewport="700x150" name="Warm stone neutrals" subtitle="Text, surfaces, borders — warm-tinted grays" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:18px}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-subtle)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
  .sw b{font-size:11px;font-weight:600}
  .sw span{font-size:10px;font-family:var(--font-mono);opacity:.7}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--stone-0);color:var(--stone-700)"><b>0</b><span>#ffffff</span></div>
    <div class="sw" style="background:var(--stone-50);color:var(--stone-700)"><b>50</b><span>#faf9f6</span></div>
    <div class="sw" style="background:var(--stone-100);color:var(--stone-700)"><b>100</b><span>#f4f2ec</span></div>
    <div class="sw" style="background:var(--stone-200);color:var(--stone-700)"><b>200</b><span>#e8e4da</span></div>
    <div class="sw" style="background:var(--stone-300);color:var(--stone-700)"><b>300</b><span>#d6d0c3</span></div>
    <div class="sw" style="background:var(--stone-400);color:#fff"><b>400</b><span>#aaa392</span></div>
    <div class="sw" style="background:var(--stone-500);color:#fff"><b>500</b><span>#7d766a</span></div>
    <div class="sw" style="background:var(--stone-600);color:#fff"><b>600</b><span>#5a544b</span></div>
    <div class="sw" style="background:var(--stone-700);color:#fff"><b>700</b><span>#423d36</span></div>
    <div class="sw" style="background:var(--stone-900);color:#fff"><b>900</b><span>#1a1814</span></div>
  </div>
</body></html>
