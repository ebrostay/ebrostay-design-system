<!-- @dsCard group="Colors" viewport="700x150" name="Brand green" subtitle="Primary — CTAs, links, brand moments" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:18px}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
  .sw b{font-size:11px;font-weight:600}
  .sw span{font-size:10px;font-family:var(--font-mono);opacity:.7}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--green-50);color:var(--green-800)"><b>50</b><span>#ecf6ef</span></div>
    <div class="sw" style="background:var(--green-100);color:var(--green-800)"><b>100</b><span>#d2ebda</span></div>
    <div class="sw" style="background:var(--green-200);color:var(--green-800)"><b>200</b><span>#a6d6b8</span></div>
    <div class="sw" style="background:var(--green-300);color:var(--green-900)"><b>300</b><span>#71bd91</span></div>
    <div class="sw" style="background:var(--green-400);color:#fff"><b>400</b><span>#43a06f</span></div>
    <div class="sw" style="background:var(--green-500);color:#fff"><b>500 ·</b><span>#1f8a57</span></div>
    <div class="sw" style="background:var(--green-600);color:#fff"><b>600</b><span>#157047</span></div>
    <div class="sw" style="background:var(--green-700);color:#fff"><b>700</b><span>#115a3a</span></div>
    <div class="sw" style="background:var(--green-800);color:#fff"><b>800</b><span>#0e4730</span></div>
    <div class="sw" style="background:var(--green-900);color:#fff"><b>900</b><span>#0a3324</span></div>
  </div>
</body></html>
