<!-- @dsCard group="Colors" viewport="700x160" name="Limestone neutrals" subtitle="Cool green-tinted grays replace warm stone" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface);padding:18px}
  .row{display:flex;gap:0;border-radius:var(--radius-control);overflow:hidden;border:1px solid var(--line)}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
  .sw b{font-size:10.5px;font-weight:600}
  .sw span{font-size:9.5px;font-family:var(--font-mono);opacity:.7}
  .note{margin:11px 2px 0;font-size:11px;color:var(--muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--page);color:var(--ink)"><b>page</b><span>#f6f8f6</span></div>
    <div class="sw" style="background:var(--surface);color:var(--ink)"><b>surface</b><span>#ffffff</span></div>
    <div class="sw" style="background:var(--surface-2);color:var(--ink)"><b>surface-2</b><span>#eef2ee</span></div>
    <div class="sw" style="background:var(--line);color:var(--ink)"><b>line</b><span>#dbe2db</span></div>
    <div class="sw" style="background:var(--line-strong);color:var(--ink)"><b>line-strong</b><span>#b9c4bb</span></div>
    <div class="sw" style="background:var(--muted);color:#fff"><b>muted</b><span>#68786f</span></div>
    <div class="sw" style="background:var(--body-text);color:#fff"><b>body-text</b><span>#3d4f47</span></div>
    <div class="sw" style="background:var(--ink);color:var(--inverse)"><b>ink</b><span>#15251f</span></div>
  </div>
  <p class="note">Every neutral carries a trace of the bridge's green — cool limestone, not v1's sunlit warm stone. Ink is green-black, never pure #000.</p>
</body></html>
