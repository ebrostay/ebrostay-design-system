<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base grid — space-1 … space-10" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:22px;color:var(--text-muted)}
  .row{display:flex;align-items:flex-end;gap:16px}
  .c{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{background:var(--green-200);border-radius:4px}
  .c b{font-family:var(--font-mono);font-size:10px}
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="box" style="width:4px;height:4px"></div><b>1·4</b></div>
    <div class="c"><div class="box" style="width:8px;height:8px"></div><b>2·8</b></div>
    <div class="c"><div class="box" style="width:12px;height:12px"></div><b>3·12</b></div>
    <div class="c"><div class="box" style="width:16px;height:16px"></div><b>4·16</b></div>
    <div class="c"><div class="box" style="width:24px;height:24px"></div><b>5·24</b></div>
    <div class="c"><div class="box" style="width:32px;height:32px"></div><b>6·32</b></div>
    <div class="c"><div class="box" style="width:40px;height:40px"></div><b>7·40</b></div>
    <div class="c"><div class="box" style="width:48px;height:48px"></div><b>8·48</b></div>
    <div class="c"><div class="box" style="width:64px;height:64px"></div><b>9·64</b></div>
    <div class="c"><div class="box" style="width:80px;height:80px"></div><b>10·80</b></div>
  </div>
</body></html>
