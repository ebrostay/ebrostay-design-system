<!-- @dsCard group="Colors" viewport="700x150" name="Terracotta / amber" subtitle="Secondary accent — Aragón sun & brick" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:18px}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px}
  .sw b{font-size:11px;font-weight:600}
  .sw span{font-size:10px;font-family:var(--font-mono);opacity:.7}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--clay-50);color:var(--clay-800)"><b>50</b><span>#fdf3ec</span></div>
    <div class="sw" style="background:var(--clay-100);color:var(--clay-800)"><b>100</b><span>#fbe2d1</span></div>
    <div class="sw" style="background:var(--clay-200);color:var(--clay-800)"><b>200</b><span>#f6c2a1</span></div>
    <div class="sw" style="background:var(--clay-300);color:var(--clay-900)"><b>300</b><span>#ef9e6e</span></div>
    <div class="sw" style="background:var(--clay-400);color:#fff"><b>400</b><span>#e87f45</span></div>
    <div class="sw" style="background:var(--clay-500);color:#fff"><b>500 ·</b><span>#d9632a</span></div>
    <div class="sw" style="background:var(--clay-600);color:#fff"><b>600</b><span>#b84e20</span></div>
    <div class="sw" style="background:var(--clay-700);color:#fff"><b>700</b><span>#93401f</span></div>
    <div class="sw" style="background:var(--clay-800);color:#fff"><b>800</b><span>#6f331c</span></div>
    <div class="sw" style="background:var(--clay-900);color:#fff"><b>900</b><span>#4a2414</span></div>
  </div>
</body></html>
