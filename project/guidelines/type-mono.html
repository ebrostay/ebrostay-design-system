<!-- @dsCard group="Type" viewport="700x190" name="Mono & eyebrow" subtitle="JetBrains Mono for refs/prices; uppercase eyebrows" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--surface-card);padding:22px;color:var(--text-body);display:flex;gap:40px;flex-wrap:wrap}
  .eyebrow{font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:var(--tracking-caps);color:var(--text-brand)}
  .mono{font-family:var(--font-mono);font-size:var(--text-base);color:var(--text-strong);font-weight:500}
  .price{font-family:var(--font-mono);font-size:var(--text-2xl);font-weight:600;color:var(--text-strong)}
  .lbl{font-size:11px;color:var(--text-subtle);margin-top:4px}
  .col{display:flex;flex-direction:column;gap:14px}
</style></head>
<body>
  <div class="col">
    <div><div class="eyebrow">Featured stay</div><div class="lbl">eyebrow · caps · tracking 0.08em</div></div>
    <div><div class="mono">REF · EBR-4821-ZGZ</div><div class="lbl">booking reference</div></div>
  </div>
  <div class="col">
    <div><div class="price">€128<span style="font-size:14px;color:var(--text-muted);font-weight:500"> / night</span></div><div class="lbl">price · mono numerals</div></div>
  </div>
</body></html>
